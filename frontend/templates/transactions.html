{% extends "base.html" %}
{% block title %}Transactions - FinanceAI{% endblock %}

{% block content %}
<div class="container py-4" style="background: var(--bg-primary); min-height: calc(100vh - 140px);">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0"><i class="fas fa-list-ul text-gradient me-2"></i>Transactions</h2>
            <p class="text-muted mb-0">Manage your income and expenses</p>
        </div>
        <div>
            <button class="btn btn-outline-danger me-2" onclick="clearAllTransactions()">
                <i class="fas fa-trash me-1"></i>Clear All
            </button>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addTransactionModal">
                <i class="fas fa-plus me-1"></i>Add Transaction
            </button>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Type</th>
                            <th class="text-end">Amount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsTable">
                        <tr><td colspan="7" class="text-center text-muted py-4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Transaction Modal -->
<div class="modal fade" id="addTransactionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="background: var(--bg-card); border-color: var(--border-color);">
            <div class="modal-header" style="border-color: var(--border-color);">
                <h5 class="modal-title fw-bold"><i class="fas fa-plus-circle me-2 text-primary"></i>Add Transaction</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" style="filter: invert(1);"></button>
            </div>
            <div class="modal-body">
                <form id="transactionForm">
                    <div class="mb-3">
                        <label class="form-label">Type</label>
                        <select class="form-select" id="tType" required>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Amount (₹)</label>
                        <input type="number" class="form-control" id="tAmount" step="0.01" min="0" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="tCategory" required>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Education">Education</option>
                            <option value="Travel">Travel</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-control" id="tDate" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <input type="text" class="form-control" id="tDescription" placeholder="Optional note">
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="border-color: var(--border-color);">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="submitTransaction()">
                    <i class="fas fa-save me-1"></i>Save
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
if (!AuthManager.isLoggedIn()) window.location.href = '/login';

document.addEventListener('DOMContentLoaded', () => {
    loadTransactions();
    document.getElementById('tDate').value = new Date().toISOString().split('T')[0];
});

async function loadTransactions() {
    const res = await apiGet('/api/transactions');
    if (!res) return;

    const tbody = document.getElementById('transactionsTable');
    if (!res.success || res.count === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No transactions yet. Click "Add Transaction" to get started.</td></tr>';
        return;
    }

    tbody.innerHTML = res.transactions.map(t => `
        <tr>
            <td><span class="badge bg-secondary bg-opacity-10 text-secondary">${t.id}</span></td>
            <td>${t.date}</td>
            <td>${t.description || '-'}</td>
            <td><span class="badge bg-secondary">${t.category}</span></td>
            <td><span class="badge ${t.type === 'income' ? 'bg-success' : 'bg-danger'}">${t.type}</span></td>
            <td class="text-end fw-bold ${t.type === 'income' ? 'text-success' : 'text-danger'}">${formatCurrency(t.amount)}</td>
            <td>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteTransaction('${t.id}')">
                    <i class="fas fa-trash"></i>
                </button>
            </td>
        </tr>
    `).join('');
}

async function submitTransaction() {
    const payload = {
        type: document.getElementById('tType').value,
        amount: parseFloat(document.getElementById('tAmount').value),
        category: document.getElementById('tCategory').value,
        date: document.getElementById('tDate').value,
        description: document.getElementById('tDescription').value
    };

    const res = await apiPost('/api/transactions', payload);
    if (res && res.success) {
        bootstrap.Modal.getInstance(document.getElementById('addTransactionModal')).hide();
        document.getElementById('transactionForm').reset();
        document.getElementById('tDate').value = new Date().toISOString().split('T')[0];
        ToastManager.show('Transaction added successfully', 'success');
        loadTransactions();
    }
}

async function deleteTransaction(id) {
    if (!confirm('Delete this transaction?')) return;
    const res = await fetch(`/api/transactions/${id}`, {
        method: 'DELETE',
        headers: AuthManager.getAuthHeaders()
    });
    const data = await res.json();
    if (data.success) {
        ToastManager.show('Transaction deleted', 'success');
        loadTransactions();
    }
}

async function clearAllTransactions() {
    if (!confirm('Delete ALL transactions? This cannot be undone.')) return;
    const res = await apiPost('/api/transactions/clear', {});
    if (res && res.success) {
        ToastManager.show('All transactions cleared', 'warning');
        loadTransactions();
    }
}
</script>
{% endblock %}
