{% extends "base.html" %}
{% block title %}Login - FinanceAI{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card animate-fade-in">
        <div class="auth-logo">
            <i class="fas fa-brain"></i>
        </div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your AI finance dashboard</p>

        <!-- Demo Credentials Box -->
        <div class="demo-box">
            <div class="demo-title"><i class="fas fa-flask me-1"></i>Try Demo Account</div>
            <div class="demo-creds">
                Username: <span>demo</span> &nbsp; Password: <span>demo123</span>
            </div>
            <button class="demo-fill-btn" onclick="fillDemo()">
                <i class="fas fa-magic me-1"></i>Auto-Fill & Login
            </button>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="auth-label form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" class="form-control auth-input" id="loginUsername" placeholder="Enter username" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="auth-label form-label">Password</label>
                <div class="input-group position-relative">
                    <span class="input-group-text" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" class="form-control auth-input" id="loginPassword" placeholder="Enter password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="auth-btn">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
        </form>

        <div class="text-center mt-4">
            <p style="color:rgba(255,255,255,0.55);">
                Don't have an account?
                <a href="/register" class="auth-link">Create Account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function fillDemo() {
    document.getElementById('loginUsername').value = 'demo';
    document.getElementById('loginPassword').value = 'demo123';
    // Auto-submit
    setTimeout(() => document.getElementById('loginForm').dispatchEvent(new Event('submit')), 300);
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    showLoading('Signing in...');

    const payload = {
        username: document.getElementById('loginUsername').value.trim(),
        password: document.getElementById('loginPassword').value
    };

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        hideLoading();

        if (data.success) {
            const token = data.token || '';   // ← read from JSON response, not cookie
            AuthManager.setAuth(token, data.user);
            ToastManager.show('Welcome, ' + data.user.username + '! 🎉', 'success');
            setTimeout(() => window.location.href = '/dashboard', 800);
        } else {
            ToastManager.show(data.message || 'Login failed. Please check your credentials.', 'error');
        }
    } catch (err) {
        hideLoading();
        ToastManager.show('Network error. Please try again.', 'error');
    }
});

function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
}
</script>
{% endblock %}
